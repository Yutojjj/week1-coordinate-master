<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Blocklyコード生成テスト</title>
<script src="https://unpkg.com/blockly@10.3.5/blockly_compressed.js"></script>
<script src="https://unpkg.com/blockly@10.3.5/javascript_compressed.js"></script>
<style>
  body { font-family: sans-serif; padding: 20px; background: #1a1a2e; color: white; }
  #blocklyDiv { width: 600px; height: 400px; border: 2px solid #444; }
  #output { background: #0d0d0d; padding: 12px; margin-top: 10px; font-family: monospace; white-space: pre; min-height: 80px; color: #4CAF50; }
  button { margin: 8px 4px; padding: 8px 16px; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
<h2>🧪 Blocklyコード生成テスト</h2>
<div id="blocklyDiv"></div>
<button onclick="generateCode()">コード生成</button>
<button onclick="runCode()">実行テスト</button>
<div id="output">ここにコードが表示されます</div>

<script>
// カスタムブロック定義
Blockly.Blocks['move_xy'] = {
  init: function() {
    this.appendDummyInput()
      .appendField("Ｘ")
      .appendField(new Blockly.FieldNumber(0, -200, 200), "VX")
      .appendField("Ｙ")
      .appendField(new Blockly.FieldNumber(0, -200, 200), "VY")
      .appendField("にうごく");
    this.setPreviousStatement(true, null);
    this.setNextStatement(true, null);
    this.setColour(160);
  }
};

Blockly.Blocks['move_x'] = {
  init: function() {
    this.appendDummyInput()
      .appendField("Ｘを")
      .appendField(new Blockly.FieldNumber(0, -200, 200), "VALUE")
      .appendField("にうごく");
    this.setPreviousStatement(true, null);
    this.setNextStatement(true, null);
    this.setColour(200);
  }
};

// コード生成
javascript.javascriptGenerator.forBlock['move_xy'] = function(block) {
  const vx = block.getFieldValue('VX') || '0';
  const vy = block.getFieldValue('VY') || '0';
  return `playerX = ${vx}; playerY = ${vy}; await movePlayer(playerX, playerY);\n`;
};
javascript.javascriptGenerator.forBlock['move_x'] = function(block) {
  const v = block.getFieldValue('VALUE') || '0';
  return `playerX = ${v}; await movePlayer(playerX, playerY);\n`;
};

const toolbox = {
  kind: 'flyoutToolbox',
  contents: [
    { kind: 'block', type: 'move_xy' },
    { kind: 'block', type: 'move_x' },
  ]
};

const ws = Blockly.inject('blocklyDiv', { toolbox, renderer: 'zelos' });

function generateCode() {
  const code = javascript.javascriptGenerator.workspaceToCode(ws);
  document.getElementById('output').textContent = '生成コード:\n' + code;
  return code;
}

async function runCode() {
  const code = generateCode();
  let playerX = -150, playerY = -150;
  const movePlayer = async (x, y) => {
    playerX = x; playerY = y;
    document.getElementById('output').textContent += `\n→ movePlayer(${x}, ${y}) が呼ばれた！`;
  };
  const wait = (ms) => new Promise(r => setTimeout(r, ms));
  try {
    const fn = new Function('movePlayer', 'wait',
      `"use strict"; let playerX = ${playerX}; let playerY = ${playerY}; return (async()=>{ ${code} })()`
    );
    await fn(movePlayer, wait);
  } catch(e) {
    document.getElementById('output').textContent += '\nエラー: ' + e.message;
  }
}
</script>
</body>
</html>
